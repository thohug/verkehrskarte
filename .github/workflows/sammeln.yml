name: Verkehrsdaten sammeln

on:
  schedule:
    # Alle 15 Minuten. GitHub haelt das nicht praezise ein - Verzoegerungen von
    # 5 bis 30 Minuten sind normal, in Spitzen mehr. Fuer die Auswertung ist das
    # unerheblich, weil der Zeitstempel beim tatsaechlichen Lauf gesetzt und
    # nach Stunde gruppiert wird. Die Messreihe wird ungleichmaessig, nicht falsch.
    - cron: "*/15 * * * *"
  workflow_dispatch:        # erlaubt manuelles Ausloesen zum Testen

permissions:
  contents: write           # noetig, um die Messwerte zurueck ins Repo zu schreiben

concurrency:
  group: sammeln
  cancel-in-progress: false # lieber warten als eine Messung verwerfen

jobs:
  sammeln:
    runs-on: ubuntu-latest
    # Der Job misst mehrfach und wartet dazwischen: 6 Messungen im Abstand von
    # 5 Minuten dauern rund 25 Minuten. Reserve fuer langsame API-Antworten.
    timeout-minutes: 40

    steps:
      - uses: actions/checkout@v7

      # Bewusst kein actions/setup-python: der ubuntu-latest-Runner bringt
      # Python 3 mit, und collect.py kommt mit der Standardbibliothek aus.
      # Ein Schritt weniger, und eine Action weniger, die veralten kann.
      # Mehrere Messungen je Aufruf. Grund: GitHub haelt den 15-Minuten-Takt
      # nicht ein - gemessen lagen zwischen zwei Laeufen im Mittel 90 Minuten,
      # in Spitzen ueber drei Stunden. Statt auf den naechsten Lauf zu warten,
      # misst ein Lauf mehrfach und deckt so ein Zeitfenster ab.
      # Misslingt eine einzelne Messung, laufen die uebrigen weiter.
      - name: Verkehrslage abrufen
        env:
          HERE_API_KEY: ${{ secrets.HERE_API_KEY }}
        run: python3 collect.py --kompakt --wiederholen 6 --abstand 300

      - name: Ergebnis committen
        run: |
          git config user.name  "verkehrskarte-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add messungen segmente
          if git diff --staged --quiet; then
            echo "Nichts Neues zu committen."
            exit 0
          fi
          git commit -m "Messung $(date -u '+%Y-%m-%d %H:%M')Z"

          # Ein anderer Lauf kann in der Zwischenzeit gepusht haben. Da jeder
          # Lauf nur eindeutig benannte Dateien anlegt und keine bestehende
          # aendert, ist der Rebase immer konfliktfrei. Sollte doch einer
          # auftreten, brechen wir sauber ab statt das Arbeitsverzeichnis in
          # einem halben Rebase stehen zu lassen.
          for versuch in 1 2 3; do
            if git push; then exit 0; fi
            echo "Push abgelehnt, ziehe nach (Versuch $versuch)"
            git fetch origin main
            if ! git rebase origin/main; then
              git rebase --abort || true
              echo "Rebase-Konflikt - das sollte nicht vorkommen." >&2
              exit 1
            fi
          done
          echo "Push nach drei Versuchen fehlgeschlagen." >&2
          exit 1
